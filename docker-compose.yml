services:
  postgres:
    image: postgres:16-alpine
    container_name: career_os_postgres
    environment:
      POSTGRES_DB: career_os
      POSTGRES_USER: career_os
      POSTGRES_PASSWORD: career_os
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U career_os -d career_os"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
